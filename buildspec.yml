version: 0.2

phases:
  install:
    commands:
      - npm install

  build:
    commands:
      - npm run build

  post_build:
    commands:
      - aws s3 sync build/ s3://sundhar-pipeline-bucket

      - aws cloudfront create-invalidation \
          --distribution-id E20GPC949JBVMM \
          --paths "/*"
